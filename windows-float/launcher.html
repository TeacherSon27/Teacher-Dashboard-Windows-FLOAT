<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOAT Launcher</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      font-family: "Avenir Next Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    }
    body.dragging { cursor: grabbing; }
    .launcher {
      position: absolute;
      inset: 4px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #5a3900;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,.82), transparent 31%),
        linear-gradient(180deg, #fff4b5 0%, #ffd54d 54%, #f4b400 100%);
      border: 2px solid rgba(255,247,201,.96);
      box-shadow:
        0 18px 28px rgba(56, 36, 0, .28),
        0 0 0 2px rgba(255, 255, 255, .18),
        inset 0 2px 0 rgba(255,255,255,.72),
        inset 0 -2px 0 rgba(164,103,0,.22);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .12em;
    }
  </style>
</head>
<body>
  <div class="launcher" aria-label="Open FLOAT">FLOAT</div>
  <script>
    const state = {
      down: false,
      moved: false,
      startX: 0,
      startY: 0
    };

    window.addEventListener("mousedown", (event) => {
      state.down = true;
      state.moved = false;
      state.startX = event.screenX;
      state.startY = event.screenY;
      document.body.classList.add("dragging");
      window.teacherFloatLauncher.dragStart(event.screenX, event.screenY);
    });

    window.addEventListener("mousemove", (event) => {
      if (!state.down) return;
      if (Math.hypot(event.screenX - state.startX, event.screenY - state.startY) > 4) {
        state.moved = true;
      }
      if (state.moved) {
        window.teacherFloatLauncher.dragMove(event.screenX, event.screenY);
      }
    });

    window.addEventListener("mouseup", () => {
      if (!state.down) return;
      window.teacherFloatLauncher.dragEnd();
      document.body.classList.remove("dragging");
      if (!state.moved) {
        window.teacherFloatLauncher.restore();
      }
      state.down = false;
      state.moved = false;
    });
  </script>
</body>
</html>
