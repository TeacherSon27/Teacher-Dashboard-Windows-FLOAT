<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOAT Launcher</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      font-family: "Avenir Next Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    }
    body.dragging { cursor: grabbing; }
    .launcher {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      box-shadow: 0 18px 28px rgba(56, 36, 0, .28);
    }
    .launcher img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border-radius: 50%;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="launcher" aria-label="Open FLOAT">
    <img src="launcher-logo.png" alt="" draggable="false">
  </div>
  <script>
    const state = {
      down: false,
      moved: false,
      pointerId: null,
      startX: 0,
      startY: 0
    };

    function inputId(event) {
      return typeof event.pointerId === "number" ? event.pointerId : "mouse";
    }

    function beginDrag(event) {
      if (state.down) return;
      if (event.pointerType === "mouse" && event.button !== 0) return;
      state.down = true;
      state.moved = false;
      state.pointerId = inputId(event);
      state.startX = event.screenX;
      state.startY = event.screenY;
      document.body.classList.add("dragging");
      try { event.currentTarget.setPointerCapture?.(event.pointerId); } catch (_error) {}
      window.teacherFloatLauncher.dragStart(event.screenX, event.screenY);
      event.preventDefault();
    }

    function moveDrag(event) {
      if (!state.down || inputId(event) !== state.pointerId) return;
      if (Math.hypot(event.screenX - state.startX, event.screenY - state.startY) > 4) {
        state.moved = true;
      }
      if (state.moved) {
        window.teacherFloatLauncher.dragMove(event.screenX, event.screenY);
      }
      event.preventDefault();
    }

    function endDrag(event) {
      if (!state.down || inputId(event) !== state.pointerId) return;
      window.teacherFloatLauncher.dragEnd();
      document.body.classList.remove("dragging");
      try { event.currentTarget.releasePointerCapture?.(event.pointerId); } catch (_error) {}
      if (!state.moved) {
        window.teacherFloatLauncher.restore();
      }
      state.down = false;
      state.moved = false;
      state.pointerId = null;
      event.preventDefault();
    }

    window.addEventListener("pointerdown", beginDrag);
    window.addEventListener("pointermove", moveDrag);
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);

    if (!window.PointerEvent) {
      window.addEventListener("mousedown", beginDrag);
      window.addEventListener("mousemove", moveDrag);
      window.addEventListener("mouseup", endDrag);
    }
  </script>
</body>
</html>
